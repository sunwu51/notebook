<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1030">
  <defs>
    <style>
      .title { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 22px; font-weight: 700; fill: #111827; text-anchor: middle; }
      .subtitle { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 13px; fill: #6B7280; text-anchor: middle; }
      .legend { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 11px; fill: #9CA3AF; text-anchor: middle; }
      .hdr { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: #FFFFFF; text-anchor: middle; dominant-baseline: middle; }
      .cell { font-family: 'Menlo', 'Consolas', 'SF Mono', monospace; font-size: 11.5px; fill: #374151; dominant-baseline: middle; }
      .nr { font-family: 'Menlo', 'Consolas', 'SF Mono', monospace; font-size: 11.5px; fill: #92400E; font-weight: 600; dominant-baseline: middle; }
      .na { font-family: -apple-system, sans-serif; font-size: 12px; fill: #9CA3AF; dominant-baseline: middle; text-anchor: middle; }
      .mark { fill: #DC2626; font-size: 9px; }
      .nt { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #374151; }
      .nn { font-family: -apple-system, 'PingFang SC', 'Segoe UI', sans-serif; font-size: 11px; fill: #4B5563; }
      .nm { fill: #DC2626; font-weight: 600; }
    </style>
    <clipPath id="tc">
      <rect x="78" y="90" width="1044" height="618" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1030" fill="#FAFBFC" rx="10"/>

  <!-- Title -->
  <text x="600" y="35" class="title">NanoLLM Request 转换映射</text>
  <text x="600" y="58" class="subtitle">NormalizedRequest 作为中间对象，与三种 API 协议双向转换 (normalize ⟷ denormalize)</text>
  <text x="600" y="78" class="legend">⬛ 灰色 = 该协议不支持此字段 ·  标注序号见底部转换说明</text>

  <!-- Table clipped content -->
  <g clip-path="url(#tc)">
    <!-- Table background -->
    <rect x="78" y="90" width="1044" height="618" fill="white"/>

    <!-- NR column tint -->
    <rect x="594" y="130" width="230" height="578" fill="#FFF7ED"/>

    <!-- Unsupported cell backgrounds -->
    <rect x="332" y="462" width="262" height="34" fill="#F0F0F0"/>
    <rect x="824" y="496" width="298" height="34" fill="#F0F0F0"/>
    <rect x="824" y="530" width="298" height="34" fill="#F0F0F0"/>
    <rect x="824" y="564" width="298" height="34" fill="#F0F0F0"/>
    <rect x="824" y="598" width="298" height="34" fill="#F0F0F0"/>

    <!-- Header backgrounds -->
    <rect x="78"  y="90" width="254" height="40" fill="#047857"/>
    <rect x="332" y="90" width="262" height="40" fill="#5B21B6"/>
    <rect x="594" y="90" width="230" height="40" fill="#B45309"/>
    <rect x="824" y="90" width="298" height="40" fill="#991B1B"/>

    <!-- Horizontal grid lines -->
    <g stroke="#E5E7EB" stroke-width="0.5">
      <line x1="78" y1="130" x2="1122" y2="130"/>
      <line x1="78" y1="164" x2="1122" y2="164"/>
      <line x1="78" y1="198" x2="1122" y2="198"/>
      <line x1="78" y1="232" x2="1122" y2="232"/>
      <line x1="78" y1="266" x2="1122" y2="266"/>
      <line x1="78" y1="300" x2="1122" y2="300"/>
      <line x1="78" y1="334" x2="1122" y2="334"/>
      <line x1="78" y1="368" x2="1122" y2="368"/>
      <line x1="78" y1="402" x2="1122" y2="402"/>
      <line x1="78" y1="436" x2="1122" y2="436"/>
      <line x1="78" y1="462" x2="1122" y2="462"/>
      <line x1="78" y1="496" x2="1122" y2="496"/>
      <line x1="78" y1="530" x2="1122" y2="530"/>
      <line x1="78" y1="564" x2="1122" y2="564"/>
      <line x1="78" y1="598" x2="1122" y2="598"/>
      <line x1="78" y1="632" x2="1122" y2="632"/>
      <line x1="78" y1="666" x2="1122" y2="666"/>
    </g>

    <!-- Vertical grid lines -->
    <g stroke="#E5E7EB" stroke-width="0.5">
      <line x1="332" y1="90" x2="332" y2="708"/>
      <line x1="594" y1="90" x2="594" y2="708"/>
      <line x1="824" y1="90" x2="824" y2="708"/>
    </g>
  </g>

  <!-- Table border -->
  <rect x="78" y="90" width="1044" height="618" rx="8" fill="none" stroke="#C9CDD3" stroke-width="1.5"/>

  <!-- Header text -->
  <text x="205" y="110" class="hdr">OpenAI Chat</text>
  <text x="463" y="110" class="hdr">OpenAI Responses</text>
  <text x="709" y="110" class="hdr">NormalizedRequest</text>
  <text x="973" y="110" class="hdr">Anthropic Messages</text>

  <!-- Row 1: model -->
  <text class="cell" x="90" y="147">model</text>
  <text class="cell" x="344" y="147">model</text>
  <text class="nr"   x="606" y="147">model</text>
  <text class="cell" x="836" y="147">model</text>

  <!-- Row 2: maxOutputTokens -->
  <text class="cell" x="90" y="181">max_completion_tokens<tspan class="mark" dx="2" dy="-4">①</tspan></text>
  <text class="cell" x="344" y="181">max_output_tokens</text>
  <text class="nr"   x="606" y="181">maxOutputTokens</text>
  <text class="cell" x="836" y="181">max_tokens</text>

  <!-- Row 3: messages -->
  <text class="cell" x="90" y="215">messages</text>
  <text class="cell" x="344" y="215">instructions + input<tspan class="mark" dx="2" dy="-4">②</tspan></text>
  <text class="nr"   x="606" y="215">messages</text>
  <text class="cell" x="836" y="215">system + messages<tspan class="mark" dx="2" dy="-4">③</tspan></text>

  <!-- Row 4: tools -->
  <text class="cell" x="90" y="249">tools | functions<tspan class="mark" dx="2" dy="-4">④</tspan></text>
  <text class="cell" x="344" y="249">tools</text>
  <text class="nr"   x="606" y="249">tools</text>
  <text class="cell" x="836" y="249">tools</text>

  <!-- Row 5: toolChoice -->
  <text class="cell" x="90" y="283">tool_choice | function_call<tspan class="mark" dx="2" dy="-4">⑤</tspan></text>
  <text class="cell" x="344" y="283">tool_choice</text>
  <text class="nr"   x="606" y="283">toolChoice</text>
  <text class="cell" x="836" y="283">tool_choice</text>

  <!-- Row 6: metadata -->
  <text class="cell" x="90" y="317">metadata</text>
  <text class="cell" x="344" y="317">metadata</text>
  <text class="nr"   x="606" y="317">metadata</text>
  <text class="cell" x="836" y="317">metadata<tspan class="mark" dx="2" dy="-4">⑥</tspan></text>

  <!-- Row 7: serviceTier -->
  <text class="cell" x="90" y="351">service_tier</text>
  <text class="cell" x="344" y="351">service_tier</text>
  <text class="nr"   x="606" y="351">serviceTier</text>
  <text class="cell" x="836" y="351">service_tier<tspan class="mark" dx="2" dy="-4">⑦</tspan></text>

  <!-- Row 8: stream -->
  <text class="cell" x="90" y="385">stream</text>
  <text class="cell" x="344" y="385">stream</text>
  <text class="nr"   x="606" y="385">stream</text>
  <text class="cell" x="836" y="385">stream</text>

  <!-- Row 9: temperature -->
  <text class="cell" x="90" y="419">temperature</text>
  <text class="cell" x="344" y="419">temperature</text>
  <text class="nr"   x="606" y="419">temperature</text>
  <text class="cell" x="836" y="419">temperature</text>

  <!-- Row 10: topP -->
  <text class="cell" x="90" y="453">top_p</text>
  <text class="cell" x="344" y="453">top_p</text>
  <text class="nr"   x="606" y="453">topP</text>
  <text class="cell" x="836" y="453">top_p</text>

  <!-- Row 11: stopSequences -->
  <text class="cell" x="90" y="479">stop<tspan class="mark" dx="2" dy="-4">⑧</tspan></text>
  <text class="na" x="463" y="479">—</text>
  <text class="nr"   x="606" y="479">stopSequences</text>
  <text class="cell" x="836" y="479">stop_sequences</text>

  <!-- Row 12: parallelToolCalls -->
  <text class="cell" x="90" y="513">parallel_tool_calls</text>
  <text class="cell" x="344" y="513">parallel_tool_calls</text>
  <text class="nr"   x="606" y="513">parallelToolCalls</text>
  <text class="na" x="973" y="513">—</text>

  <!-- Row 13: promptCacheKey -->
  <text class="cell" x="90" y="547">prompt_cache_key</text>
  <text class="cell" x="344" y="547">prompt_cache_key</text>
  <text class="nr"   x="606" y="547">promptCacheKey</text>
  <text class="na" x="973" y="547">—</text>

  <!-- Row 14: promptCacheRetention -->
  <text class="cell" x="90" y="581">prompt_cache_retention</text>
  <text class="cell" x="344" y="581">prompt_cache_retention</text>
  <text class="nr"   x="606" y="581">promptCacheRetention</text>
  <text class="na" x="973" y="581">—</text>

  <!-- Row 15: safetyIdentifier -->
  <text class="cell" x="90" y="615">safety_identifier</text>
  <text class="cell" x="344" y="615">safety_identifier</text>
  <text class="nr"   x="606" y="615">safetyIdentifier</text>
  <text class="na" x="973" y="615">—</text>

  <!-- Row 16: reasoningEffort -->
  <text class="cell" x="90" y="649">reasoning_effort</text>
  <text class="cell" x="344" y="649">reasoning.effort</text>
  <text class="nr"   x="606" y="649">reasoningEffort</text>
  <text class="cell" x="836" y="649">thinking.budget_tokens<tspan class="mark" dx="2" dy="-4">⑨</tspan></text>

  <!-- Row 17: responseFormat -->
  <text class="cell" x="90" y="683">response_format</text>
  <text class="cell" x="344" y="683">text.format</text>
  <text class="nr"   x="606" y="683">responseFormat</text>
  <text class="cell" x="836" y="683">output_config.format</text>

  <!-- Notes section -->
  <text class="nt" x="78" y="735">转换说明</text>
  <line x1="78" y1="742" x2="400" y2="742" stroke="#E5E7EB" stroke-width="1"/>

  <text class="nn" x="88" y="762"><tspan class="nm">① </tspan>Chat 优先使用 max_completion_tokens，回退到 max_tokens</text>
  <text class="nn" x="88" y="782"><tspan class="nm">② </tspan>Responses 中 instructions 映射为 developer 角色消息，input 映射为对话消息</text>
  <text class="nn" x="88" y="802"><tspan class="nm">③ </tspan>Anthropic 的 system 字段独立提取为 system 角色消息</text>
  <text class="nn" x="88" y="822"><tspan class="nm">④ </tspan>Chat 同时支持 tools[] 数组和旧版 functions[] 数组，合并到 tools</text>
  <text class="nn" x="88" y="842"><tspan class="nm">⑤ </tspan>Chat 同时支持 tool_choice 和旧版 function_call 字段</text>
  <text class="nn" x="88" y="862"><tspan class="nm">⑥ </tspan>Anthropic 的 metadata 仅支持 user_id 字段</text>
  <text class="nn" x="88" y="882"><tspan class="nm">⑦ </tspan>Anthropic service_tier: "default" 映射为 "standard_only"</text>
  <text class="nn" x="88" y="902"><tspan class="nm">⑧ </tspan>Chat 的 stop 字段 (string | string[]) 统一归一化为 string[]</text>
  <text class="nn" x="88" y="922"><tspan class="nm">⑨ </tspan>Anthropic thinking.budget_tokens 编码为 "budget:N" 字符串；effort 级别 (low/medium/high) 映射为固定 token 预算</text>

  <!-- Unsupported fields section -->
  <text class="nt" x="78" y="958">各协议忽略的字段</text>
  <line x1="78" y1="965" x2="400" y2="965" stroke="#E5E7EB" stroke-width="1"/>
  <text class="nn" x="88" y="982"><tspan font-weight="600" fill="#047857">Chat: </tspan>audio, frequency_penalty, logit_bias, logprobs, modalities, n, prediction, presence_penalty, seed, top_logprobs, web_search_options</text>
  <text class="nn" x="88" y="1000"><tspan font-weight="600" fill="#5B21B6">Responses: </tspan>background, context_management, conversation, previous_response_id, prompt, truncation</text>
  <text class="nn" x="88" y="1018"><tspan font-weight="600" fill="#991B1B">Anthropic: </tspan>container, inference_geo, top_k</text>
</svg>
